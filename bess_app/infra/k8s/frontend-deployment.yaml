apiVersion: apps/v1
kind: Deployment
metadata:
  name: bess-frontend
  labels:
    app: bess-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bess-frontend
  template:
    metadata:
      labels:
        app: bess-frontend
    spec:
      containers:
      - name: frontend
        image: bess-app/frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bess-frontend
spec:
  selector:
    app: bess-frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
