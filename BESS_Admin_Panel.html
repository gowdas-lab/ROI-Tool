<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BESS Admin Panel — Elektron RE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap');

:root {
  --bg:       #0d0f12;
  --surface:  #13161b;
  --surface2: #1a1e26;
  --border:   #232830;
  --border2:  #2e3440;
  --accent:   #00e5a0;
  --accent2:  #0af;
  --danger:   #ff5a5a;
  --warn:     #f5a623;
  --text:     #e8ecf0;
  --muted:    #6b7585;
  --mono:     'DM Mono', monospace;
  --sans:     'Syne', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}

/* LAYOUT */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;background:var(--surface)}
.content{flex:1;overflow-y:auto;padding:28px 28px}

/* SIDEBAR */
.logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.logo-mark{font-family:var(--sans);font-size:13px;font-weight:800;letter-spacing:.08em;color:var(--accent);text-transform:uppercase}
.logo-sub{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.nav{padding:12px 10px;flex:1}
.nav-section{font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;padding:12px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(0,229,160,.1);color:var(--accent);border:1px solid rgba(0,229,160,.2)}
.nav-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.nav-count{margin-left:auto;font-family:var(--mono);font-size:10px;background:var(--surface2);border:1px solid var(--border2);padding:1px 6px;border-radius:20px}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border);font-size:10px;font-family:var(--mono);color:var(--muted)}

/* TOPBAR */
.page-title{font-size:14px;font-weight:700;letter-spacing:.03em}
.breadcrumb{font-size:11px;color:var(--muted);font-family:var(--mono)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--sans);letter-spacing:.02em;transition:all .15s}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#00ccaa;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:rgba(255,90,90,.12);color:var(--danger);border:1px solid rgba(255,90,90,.25)}
.btn-danger:hover{background:rgba(255,90,90,.2)}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}

/* STATS ROW */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent)}
.stat-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-value{font-size:26px;font-weight:800;letter-spacing:-.02em;font-family:var(--mono)}
.stat-sub{font-size:10px;color:var(--muted);margin-top:4px;font-family:var(--mono)}
.stat-card.blue::before{background:linear-gradient(90deg,var(--accent2),transparent)}
.stat-card.warn::before{background:linear-gradient(90deg,var(--warn),transparent)}
.stat-card.danger::before{background:linear-gradient(90deg,var(--danger),transparent)}

/* TABS */
.tab-bar{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px}
.tab{padding:7px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);transition:all .15s}
.tab.active{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.tab:hover:not(.active){color:var(--text)}

/* SEARCH + FILTER BAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.search-box{flex:1;position:relative}
.search-box input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:9px 12px 9px 36px;color:var(--text);font-size:13px;font-family:var(--sans);outline:none}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,160,.08)}
.search-box::before{content:'⌕';position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
.filter-select{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:12px;font-family:var(--sans);outline:none;cursor:pointer}
.filter-select:focus{border-color:var(--accent)}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.table-title{font-size:12px;font-weight:700;letter-spacing:.04em}
.table-meta{font-size:11px;color:var(--muted);font-family:var(--mono)}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 16px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface)}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child{border-bottom:none}
td{padding:12px 16px;font-size:12px;vertical-align:middle}
.td-mono{font-family:var(--mono)}
.td-muted{color:var(--muted);font-size:11px}
.actions-cell{display:flex;gap:6px;align-items:center}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em;font-family:var(--mono)}
.badge-green{background:rgba(0,229,160,.12);color:var(--accent);border:1px solid rgba(0,229,160,.25)}
.badge-blue{background:rgba(0,170,255,.12);color:var(--accent2);border:1px solid rgba(0,170,255,.25)}
.badge-warn{background:rgba(245,166,35,.12);color:var(--warn);border:1px solid rgba(245,166,35,.25)}
.badge-danger{background:rgba(255,90,90,.12);color:var(--danger);border:1px solid rgba(255,90,90,.25)}
.badge-gray{background:var(--surface2);color:var(--muted);border:1px solid var(--border2)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:680px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.modal-title{font-size:15px;font-weight:700}
.modal-badge{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:20px;background:rgba(0,229,160,.1);color:var(--accent);border:1px solid rgba(0,229,160,.2)}
.modal-close{margin-left:auto;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:5px 10px;color:var(--muted);cursor:pointer;font-size:14px}
.modal-close:hover{color:var(--text);border-color:var(--accent)}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:10px}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid.cols-1{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.span-2{grid-column:span 2}
label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
input,select,textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:12px;font-family:var(--sans);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,160,.08)}
textarea{resize:vertical;min-height:72px}
.form-hint{font-size:10px;color:var(--muted);font-family:var(--mono)}
.form-section{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);padding:14px 0 8px;border-top:1px solid var(--border);margin-top:4px}
.form-section:first-child{border-top:none;padding-top:0}

/* SCORE INPUTS */
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px}
.score-item{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:4px}
.score-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.score-input{background:none;border:none;font-size:18px;font-weight:800;color:var(--text);font-family:var(--mono);width:100%;padding:0;outline:none}

/* TOAST */
.toast-area{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:2000}
.toast{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;font-size:12px;display:flex;align-items:center;gap:10px;animation:toastIn .25s ease;min-width:260px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.success{border-left:3px solid var(--accent)}
.toast.error{border-left:3px solid var(--danger)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
.toast-icon{font-size:16px}

/* CONFIRM DIALOG */
.confirm-box{background:var(--surface);border:1px solid rgba(255,90,90,.3);border-radius:12px;padding:24px;width:380px;animation:modalIn .2s ease;text-align:center}
.confirm-icon{font-size:36px;margin-bottom:12px}
.confirm-title{font-size:15px;font-weight:700;margin-bottom:6px}
.confirm-msg{font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.6}
.confirm-btns{display:flex;gap:10px;justify-content:center}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-text{font-size:13px}

/* CATEGORY COLOR STRIP */
.cat-strip{display:inline-flex;align-items:center;gap:6px;font-size:11px}
.cat-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* SCORE BAR */
.score-bar{display:flex;align-items:center;gap:8px}
.score-bar-track{flex:1;height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .3s}
.score-num{font-family:var(--mono);font-size:11px;font-weight:700;min-width:24px;text-align:right}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="shell">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">Elektron RE</div>
    <div class="logo-sub">BESS Admin Panel v1.0</div>
  </div>
  <nav class="nav">
    <div class="nav-section">Database</div>
    <button class="nav-item active" onclick="setTab('bom')">
      <span class="nav-dot"></span>BOM Catalogue
      <span class="nav-count" id="nav-bom-count">63</span>
    </button>
    <button class="nav-item" onclick="setTab('suppliers')">
      <span class="nav-dot"></span>Suppliers
      <span class="nav-count" id="nav-sup-count">0</span>
    </button>
    <button class="nav-item" onclick="setTab('supplier-components')">
      <span class="nav-dot"></span>Supplier Components
      <span class="nav-count" id="nav-sc-count">0</span>
    </button>
    <div class="nav-section">Config</div>
    <button class="nav-item" onclick="setTab('weights')">
      <span class="nav-dot"></span>Scoring Weights
    </button>
    <button class="nav-item" onclick="setTab('export')">
      <span class="nav-dot"></span>Import / Export
    </button>
  </nav>
  <div class="sidebar-footer">
    DB: PostgreSQL 16<br>
    API: localhost:8000
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div>
      <div class="page-title" id="topbar-title">BOM Catalogue</div>
      <div class="breadcrumb" id="topbar-bread">Database → BOM Items</div>
    </div>
    <div class="topbar-right" id="topbar-actions">
      <button class="btn btn-ghost" onclick="syncFromApi()">⟳ Sync API</button>
      <button class="btn btn-primary" id="btn-add-main" onclick="openAddModal()">+ Add Item</button>
    </div>
  </div>

  <div class="content" id="main-content">
    <!-- Injected by JS -->
  </div>
</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Add BOM Item</div>
      <span class="modal-badge" id="modal-badge">NEW</span>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModalDirect()">Cancel</button>
      <button class="btn btn-primary" id="modal-save" onclick="saveModal()">Save to Database</button>
    </div>
  </div>
</div>

<!-- CONFIRM DIALOG -->
<div class="modal-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-icon">⚠</div>
    <div class="confirm-title" id="confirm-title">Delete this item?</div>
    <div class="confirm-msg" id="confirm-msg">This action cannot be undone. The record will be permanently removed from the database.</div>
    <div class="confirm-btns">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-area" id="toast-area"></div>

function setTab(tab) {
  currentTab = tab; searchQ = ''; filterCat = 'all';
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  updateNavCounts();
  const titles = {
    bom:'BOM Catalogue', suppliers:'Supplier Database', 'supplier-components':'Supplier Components',
    weights:'Scoring Weights', export:'Import / Export'
  };
  const breads = {
    bom:'Database → BOM Items', suppliers:'Database → Suppliers', 'supplier-components':'Database → Supplier Components',
    weights:'Config → Scoring Weights', export:'Tools → Import / Export'
  };
  document.getElementById('topbar-title').textContent = titles[tab];
  document.getElementById('topbar-bread').textContent = breads[tab];
  document.getElementById('btn-add-main').textContent = tab==='weights'?'Reset to Defaults': tab==='export'?'Export JSON':'+  Add Item';
  document.getElementById('btn-add-main').onclick = tab==='weights'?resetWeights: tab==='export'?exportAll: openAddModal;
  renderContent();
}

function updateNavCounts() {
  document.getElementById('nav-bom-count').textContent = BOM_ITEMS.length;
  document.getElementById('nav-sup-count').textContent = SUPPLIERS.length;
  document.getElementById('nav-sc-count').textContent = SUP_COMPONENTS.length;
}

function renderContent() {
  const el = document.getElementById('main-content');
  if (currentTab==='bom')                el.innerHTML = renderBomTab();
  else if (currentTab==='suppliers')     el.innerHTML = renderSuppliersTab();
  else if (currentTab==='supplier-components') el.innerHTML = renderScTab();
  else if (currentTab==='weights')       el.innerHTML = renderWeightsTab();
  else if (currentTab==='export')        el.innerHTML = renderExportTab();
  attachTableEvents();
}

// ── STATS ──────────────────────────────────
function statsHtml(cards) {
  return `<div class="stats">${cards.map(c=>`
    <div class="stat-card ${c.cls||''}">
      <div class="stat-label">${c.label}</div>
      <div class="stat-value" style="color:${c.color||'var(--accent)'}">${c.value}</div>
      <div class="stat-sub">${c.sub||''}</div>
    </div>`).join('')}</div>`;
}

function renderBomTab() {
  const totalCost = BOM_ITEMS.reduce((s,i)=>s+i.unit_price,0);
  const cats = [...new Set(BOM_ITEMS.map(i=>i.category))];
  let items = BOM_ITEMS.filter(i => {
    const q = searchQ.toLowerCase();
    const matchQ = !q || i.description.toLowerCase().includes(q) || i.category.toLowerCase().includes(q) || String(i.bom_number).includes(q);
    const matchC = filterCat==='all' || i.category===filterCat;
    return matchQ && matchC;
  });

  return statsHtml([
    {label:'Total BOM Items',    value:BOM_ITEMS.length,                     sub:'All categories',        color:'var(--accent)'},
    {label:'Total List Value',   value:'₹'+fmt(totalCost),                  sub:'Sum of unit prices',    color:'var(--accent2)', cls:'blue'},

function renderScTab() {
  let items = SUP_COMPONENTS.filter(c => {
    const q = searchQ.toLowerCase();
    return !q || c.supplier_name.toLowerCase().includes(q) || c.component.toLowerCase().includes(q) || c.model.toLowerCase().includes(q);
  });

  return statsHtml([

    {label:'BOM Items Covered',  value:[...new Set(SUP_COMPONENTS.map(c=>c.bom_number))].length, sub:'Unique BOM items', color:'var(--accent2)',cls:'blue'},
    {label:'Avg Weighted Score', value:(SUP_COMPONENTS.reduce((s,c)=>s+computeScore(c),0)/Math.max(1,SUP_COMPONENTS.length)).toFixed(1), sub:'Out of 10', color:'var(--warn)',cls:'warn'},
    {label:'Suppliers Active',   value:[...new Set(SUP_COMPONENTS.map(c=>c.supplier_id))].length,sub:'With components', color:'var(--muted)',cls:'danger'},
  ])+`
  <div class="toolbar">
    <div class="search-box"><input placeholder="Search supplier name, component, model…" oninput="searchSc(this.value)" value="${searchQ}"/></div>
  </div>
  <div class="table-wrap">

      <div class="table-meta">${items.length} entries</div>
    </div>
    <table>
      <thead><tr>
        <th>BOM#</th><th>Component</th><th>Supplier</th><th>Model</th><th>Unit ₹</th><th>Tech</th><th>Delivery</th><th>Warranty</th><th>Support</th><th>Cert</th><th>Weighted</th><th>Actions</th>
      </tr></thead>
      <tbody>
      ${items.map(c=>{
        const ws = computeScore(c);
        const wsColor = ws>=8.5?'var(--accent)':ws>=7?'var(--warn)':'var(--danger)';
        return `<tr>
          <td class="td-mono">#${c.bom_number}</td>
          <td style="font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.component}</td>
          <td style="font-weight:600;font-size:11px">${c.supplier_name}</td>
          <td class="td-mono" style="font-size:10px">${c.model}</td>
          <td class="td-mono" style="font-weight:700;color:var(--accent2)">₹${fmt(c.unit_price)}</td>
          ${[c.tech,c.delivery,c.warranty,c.support,c.cert].map(v=>`<td><div class="score-bar"><div class="score-bar-track"><div class="score-bar-fill" style="width:${v*10}%"></div></div><span class="score-num">${v}</span></div></td>`).join('')}
          <td><span style="font-family:var(--mono);font-size:13px;font-weight:800;color:${wsColor}">${ws}</span></td>
          <td><div class="actions-cell">
            <button class="btn btn-ghost btn-sm" data-action="edit-sc" data-id="${c.id}">Edit</button>
            <button class="btn btn-danger btn-sm" data-action="del-sc" data-id="${c.id}">Delete</button>
          </div></td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>
  </div>`;
}

function computeScore(c) {
  const prices = SUP_COMPONENTS.filter(x=>x.bom_number===c.bom_number).map(x=>x.unit_price);
  const mn = Math.min(...prices), mx = Math.max(...prices);
  const ps = mx===mn ? 10 : 10*(1-(c.unit_price-mn)/(mx-mn));
  const ws = (WEIGHTS.price/100)*ps + (WEIGHTS.technical/100)*c.tech + (WEIGHTS.delivery/100)*c.delivery + (WEIGHTS.warranty/100)*c.warranty + (WEIGHTS.support/100)*c.support + (WEIGHTS.certification/100)*c.cert;
  return Math.round(ws*100)/100;
}

  const valid = total===100;
  const entries = [
    {key:'price',        label:'Unit Price / Cost',         desc:'Lowest cost for equivalent spec. Most impactful for CAPEX.', color:var(--warn)},
    {key:'technical',    label:'Technical Score',            desc:'Performance spec match, quality certifications (IEC, BIS, CE).', color:var(--accent)},
    {key:'delivery',     label:'Delivery & Lead Time',       desc:'Stock availability, lead time, project schedule.', color:var(--accent2)},
    {key:'warranty',     label:'Warranty & After-Sales',     desc:'Warranty duration, replacement SLA.', color:'#a855f7'},
    {key:'support',      label:'Local Support & Service',    desc:'Pan-India service network, response time.', color:'#f97316'},
    {key:'certification',label:'Certifications & Compliance',desc:'IEC, BIS, MNRE, IS standards. Grid code.', color:'#ec4899'},
  ];

  return `<div style="max-width:700px">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden">
    <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <div><div style="font-size:14px;font-weight:700">Supplier Scoring Weights</div><div style="font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono)">Sheet 8 — User-configurable · Total must = 100%</div></div>
      <div style="font-size:22px;font-weight:800;font-family:var(--mono);color:${valid?'var(--accent)':'var(--danger)'}">${total}%</div>
    </div>
    <div style="padding:24px;display:flex;flex-direction:column;gap:16px">
    ${entries.map(e=>`
      <div style="display:flex;align-items:center;gap:16px">
        <div style="flex:1">
          <div style="font-size:12px;font-weight:700;margin-bottom:2px">${e.label}</div>
          <div style="font-size:10px;color:var(--muted)">${e.desc}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;width:260px">
          <input type="range" min="0" max="60" value="${WEIGHTS[e.key]}" 
            style="flex:1;accent-color:${e.color}"
            oninput="updateWeight('${e.key}',+this.value);this.nextElementSibling.textContent=this.value+'%'"/>
          <span style="font-family:var(--mono);font-size:14px;font-weight:800;min-width:38px;text-align:right;color:${e.color}">${WEIGHTS[e.key]}%</span>
        </div>
      </div>`).join('')}
    </div>
    <div style="padding:16px 24px;border-top:1px solid var(--border);background:var(--surface2)">
      <div style="font-size:11px;color:${valid?'var(--accent)':'var(--danger)'};font-family:var(--mono)">
        ${valid?'✓ Weights are valid — total = 100%':'⚠ Total must equal 100% before saving. Current: '+total+'%'}
      </div>
    </div>
  </div>
  <div style="margin-top:16px">
    <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Rack-Count Tier Rules (Sheet 8)</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden">
      <table><thead><tr><th>Tier</th><th>Rack Count Range</th><th>Module Bundle</th></tr></thead>
      <tbody>
        <tr><td><span class="badge badge-gray">Tier 1</span></td><td>1–4 racks</td><td>4-Rack Config Bundle</td></tr>
        <tr><td><span class="badge badge-blue">Tier 2</span></td><td>5–8 racks</td><td>8-Rack Config Bundle</td></tr>
        <tr><td><span class="badge badge-green">Tier 3</span></td><td>9–12 racks</td><td>12-Rack Config Bundle</td></tr>
        <tr><td><span class="badge badge-warn">Tier 4</span></td><td>&gt;12 racks</td><td>16+ Rack / Bulk Rate</td></tr>
      </tbody></table>
    </div>
  </div></div>`;
}

function updateWeight(key, val) {
  WEIGHTS[key] = val;
  renderContent();
  toast('Weight updated — remember to save','success');
}
function resetWeights() {
  WEIGHTS = {price:25,technical:30,delivery:15,warranty:15,support:10,certification:5};
  renderContent();
  toast('Weights reset to Sheet 8 defaults','success');
}

  document.getElementById('modal-body').innerHTML = `
    <div class="form-grid">
      <div class="form-group">
        <label>BOM Number</label>
        <input type="number" id="f-bom-num" value="${item?.bom_number??maxBomNum}" min="1"/>

      </div>
      <div class="form-group">
        <label>Category</label>

function openModalEl() {
  document.getElementById('modal-save').textContent = 'Save to Database';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null; modalType = null;
}
function closeModal(e) { if(e.target===document.getElementById('modal-overlay')) closeModalDirect(); }

function saveModal() {
  if (modalType==='bom')      saveBom();
  else if (modalType==='supplier') saveSup();
  else if (modalType==='sc')  saveSc();
  else if (modalType==='import') doImport();
}

function saveBom() {
  const bom_number = +document.getElementById('f-bom-num').value;
  const category   = document.getElementById('f-bom-cat').value;
  const description= document.getElementById('f-bom-desc').value.trim();
  const qty_formula= document.getElementById('f-bom-qty').value.trim();
  const unit       = document.getElementById('f-bom-unit').value.trim();
  const spec       = document.getElementById('f-bom-spec').value.trim();
  const unit_price = +document.getElementById('f-bom-price').value;
  const notes      = document.getElementById('f-bom-notes').value.trim();
  if (!description) { toast('Description is required','error'); return; }
  if (editingId) {
    const idx = BOM_ITEMS.findIndex(i=>i.id===editingId);
    BOM_ITEMS[idx] = {...BOM_ITEMS[idx], bom_number, category, description, qty_formula, unit, spec, unit_price, notes};
    toast(`BOM #${bom_number} updated successfully`,'success');
  } else {
    if (BOM_ITEMS.find(i=>i.bom_number===bom_number)) { toast('BOM number already exists','error'); return; }
    BOM_ITEMS.push({id:nextBomId++, bom_number, category, description, qty_formula, unit, spec, unit_price, notes});
    toast(`BOM #${bom_number} added to database`,'success');
  }
  closeModalDirect(); renderContent();
}

function saveSup() {
  const name    = document.getElementById('f-sup-name').value.trim();
  const country = document.getElementById('f-sup-country').value.trim();
  const tier    = document.getElementById('f-sup-tier').value;
  const website = document.getElementById('f-sup-web').value.trim();
  const certs   = document.getElementById('f-sup-certs').value.trim();
  if (!name) { toast('Supplier name is required','error'); return; }
  if (editingId) {
    const idx = SUPPLIERS.findIndex(s=>s.id===editingId);
    SUPPLIERS[idx] = {...SUPPLIERS[idx], name, country, tier, website, certs};
    toast(`${name} updated`,'success');
  } else {
    SUPPLIERS.push({id:nextSupId++, name, country, tier, website, certs});
    toast(`${name} added to database`,'success');
  }
  closeModalDirect(); renderContent();
}

function saveSc() {
  const supplier_id   = +document.getElementById('f-sc-sup').value;
  const bom_number    = +document.getElementById('f-sc-bom').value;
  const component     = document.getElementById('f-sc-comp').value.trim();
  const model         = document.getElementById('f-sc-model').value.trim();
  const unit_price    = +document.getElementById('f-sc-price').value;
  const tech          = +document.getElementById('f-sc-tech').value;
  const delivery      = +document.getElementById('f-sc-delivery').value;
  const warranty      = +document.getElementById('f-sc-warranty').value;
  const support       = +document.getElementById('f-sc-support').value;
  const cert          = +document.getElementById('f-sc-cert').value;
  const supplier_name = SUPPLIERS.find(s=>s.id===supplier_id)?.name ?? '';
  if (!component) { toast('Component description required','error'); return; }
  if (editingId) {
    const idx = SUP_COMPONENTS.findIndex(c=>c.id===editingId);
    SUP_COMPONENTS[idx] = {...SUP_COMPONENTS[idx], supplier_id, bom_number, component, model, unit_price, tech, delivery, warranty, support, cert, supplier_name};
    toast('Component entry updated','success');
  } else {
    SUP_COMPONENTS.push({id:nextScId++, supplier_id, bom_number, component, model, unit_price, tech, delivery, warranty, support, cert, supplier_name});
    toast('Component entry added','success');
  }
  closeModalDirect(); renderContent();
}

function doImport() {
  const type = document.getElementById('f-import-type').value;
  const raw  = document.getElementById('f-import-json').value.trim();
  let data;
  try { data = JSON.parse(raw); } catch(e) { toast('Invalid JSON — check syntax','error'); return; }
  if (!Array.isArray(data)) { toast('Must be a JSON array [...]','error'); return; }
  if (type==='bom') {
    data.forEach(d => { if(d.bom_number && d.description) { BOM_ITEMS.push({id:nextBomId++,...d}); } });
    toast(`${data.length} BOM items imported`,'success');
  } else if (type==='suppliers') {
    data.forEach(d => { if(d.name) { SUPPLIERS.push({id:nextSupId++,...d}); } });
    toast(`${data.length} suppliers imported`,'success');
  } else {
    data.forEach(d => { if(d.supplier_id && d.bom_number) { SUP_COMPONENTS.push({id:nextScId++,...d}); } });
    toast(`${data.length} components imported`,'success');
  }
  closeModalDirect(); renderContent();
}

// ══════════════════════════════════════════
// TABLE EVENT DELEGATION
// ══════════════════════════════════════════
function attachTableEvents() {
  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', e => {
      const action = btn.dataset.action;
      const id = +btn.dataset.id;
      if (action==='edit-bom')  { editingId=id; openBomModal(BOM_ITEMS.find(i=>i.id===id)); }
      if (action==='del-bom')   { confirmDelete(()=>{ BOM_ITEMS=BOM_ITEMS.filter(i=>i.id!==id); renderContent(); toast('BOM item deleted','success'); },'Delete BOM Item?','This BOM component will be removed from the catalogue.'); }
      if (action==='edit-sup')  { editingId=id; openSupModal(SUPPLIERS.find(s=>s.id===id)); }
      if (action==='del-sup')   { confirmDelete(()=>{ SUPPLIERS=SUPPLIERS.filter(s=>s.id!==id); SUP_COMPONENTS=SUP_COMPONENTS.filter(c=>c.supplier_id!==id); renderContent(); toast('Supplier deleted','success'); },'Delete Supplier?','This supplier and all their component entries will be removed.'); }
      if (action==='edit-sc')   { editingId=id; openScModal(SUP_COMPONENTS.find(c=>c.id===id)); }
      if (action==='del-sc')    { confirmDelete(()=>{ SUP_COMPONENTS=SUP_COMPONENTS.filter(c=>c.id!==id); renderContent(); toast('Component entry deleted','success'); },'Delete Entry?','This supplier-component mapping will be removed.'); }
    });
  });
}

function downloadJson(data, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download = filename; a.click();
  toast(`${filename} downloaded`,'success');
}

function syncFromApi() {
  toast('Connected to localhost:8000 — sync would pull live DB data','success');
}

// ══════════════════════════════════════════
// CONFIRM + TOAST
// ══════════════════════════════════════════
function confirmDelete(cb, title='Delete?', msg='This cannot be undone.') {
  confirmCallback = cb;
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-ok').onclick = () => { cb(); closeConfirm(); };
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); }

function toast(msg, type='success') {
  const area = document.getElementById('toast-area');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="toast-icon">${type==='success'?'✓':'✕'}</span>${msg}`;
  area.appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}
